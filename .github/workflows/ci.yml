name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run python scripts/validate_fixtures.py --strict

  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - name: Run cargo test
        id: cargo-test
        continue-on-error: true
        run: |
          cargo test 2>&1 | tee cargo-test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
      - name: Check failures against known-failures list
        if: steps.cargo-test.outcome == 'failure'
        run: |
          FAILED=$(awk '/^failures:$/,/^$/' cargo-test-output.txt \
            | grep -E '^\s+\S' \
            | sed 's/^[[:space:]]*//' \
            | tr '\n' ',' \
            | sed 's/,$//')
          if [ -n "$FAILED" ]; then
            uv run python scripts/check_known_failures.py \
              --check --runner cargo --failures "$FAILED"
          else
            echo "Tests failed but no specific test names found in output."
            exit 1
          fi

  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - name: Run pytest
        id: pytest
        continue-on-error: true
        run: |
          uv run pytest suites/ -m "not local" 2>&1 | tee pytest-output.txt
          exit_code=${PIPESTATUS[0]}
          if [ "$exit_code" -eq 5 ]; then
            echo "No tests collected (exit 5), treating as success."
            exit 0
          fi
          exit $exit_code
      - name: Check failures against known-failures list
        if: steps.pytest.outcome == 'failure'
        run: |
          FAILED=$(grep '^FAILED ' pytest-output.txt \
            | sed 's/^FAILED //' \
            | sed 's/ -.*//' \
            | tr '\n' ',' \
            | sed 's/,$//')
          if [ -n "$FAILED" ]; then
            uv run python scripts/check_known_failures.py \
              --check --runner pytest --failures "$FAILED"
          else
            echo "Tests failed but no FAILED lines found in output."
            exit 1
          fi

  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: astral-sh/setup-uv@v5
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: uv sync
      - run: uv run ruff check
