name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      - run: uv sync
      - run: uv run python scripts/validate_fixtures.py --strict

  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      - run: uv sync
      - name: Run cargo test
        id: cargo-test
        continue-on-error: true
        run: |
          cargo test 2>&1 | tee cargo-test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
      - name: Check failures against known-failures list
        if: steps.cargo-test.outcome == 'failure'
        run: |
          FAILED=$(awk '/^failures:$/,/^$/' cargo-test-output.txt \
            | grep -E '^\s+\S' \
            | sed 's/^[[:space:]]*//' \
            | tr '\n' ',' \
            | sed 's/,$//')
          if [ -n "$FAILED" ]; then
            uv run python scripts/check_known_failures.py \
              --check --runner cargo --failures "$FAILED"
          else
            echo "Tests failed but no specific test names found in output."
            exit 1
          fi

  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      - run: uv sync
      - name: Run pytest
        id: pytest
        continue-on-error: true
        run: |
          uv run pytest suites/ -m "not local" 2>&1 | tee pytest-output.txt
          exit_code=${PIPESTATUS[0]}
          if [ "$exit_code" -eq 5 ]; then
            echo "No tests collected (exit 5), treating as success."
            exit 0
          fi
          exit $exit_code
      - name: Check failures against known-failures list
        if: steps.pytest.outcome == 'failure'
        run: |
          FAILED=$(grep '^FAILED ' pytest-output.txt \
            | sed 's/^FAILED //' \
            | sed 's/ -.*//' \
            | tr '\n' ',' \
            | sed 's/,$//')
          if [ -n "$FAILED" ]; then
            uv run python scripts/check_known_failures.py \
              --check --runner pytest --failures "$FAILED"
          else
            echo "Tests failed but no FAILED lines found in output."
            exit 1
          fi

  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: uv sync
      - run: uv run ruff check
