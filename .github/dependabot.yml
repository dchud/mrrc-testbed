# Dependabot: keep Rust crates, Python (uv) deps, and GitHub Actions current.
#
# A 7-day cooldown holds off opening a PR until a freshly published release has
# been out for a week. Minor and patch bumps are grouped per ecosystem to keep
# PR volume down; majors (including mrrc itself) arrive as individual PRs so
# breaking upgrades get their own review.
version: 2
updates:
  # Rust crates — workspace root + members, including the mrrc under test.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Python dependencies — uv / pyproject.toml.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    groups:
      uv-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
